name: Update Elo Ratings

# Runs nightly just after midnight UTC to pick up any rating changes from the day's games.
# workflow_dispatch allows a manual refresh any time from the Actions tab.

on:
  schedule:
    - cron: '5 0 * * *'   # 00:05 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-elo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest Elo ratings
        run: node scripts/update-elo.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet elo-history.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "wc26-elo-bot"
          git config user.email "noreply@github.com"
          git add elo-history.json
          git commit -m "chore: update elo ratings [skip ci]"
          git push
