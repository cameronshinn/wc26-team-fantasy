name: Update WC26 Results

# Triggered externally via workflow_dispatch (called by cron job every 5 min).
# Manual runs from the Actions tab also work.
#
# One-time setup:
#   1. Get a free API key at https://www.football-data.org/client/register
#   2. In your GitHub repo: Settings → Secrets → Actions → New repository secret
#      Name:  FOOTBALL_API_KEY
#      Value: <your key>

on:
  workflow_dispatch:          # triggered by external cron job or manual run

permissions:
  contents: write             # needed to commit results.js back to the repo

jobs:
  # Cheap gate: skips the update job entirely outside the tournament window.
  # workflow_dispatch always bypasses this check so manual runs always work.
  check-window:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - name: Check tournament window (Jun 11 – Jul 19 2026)
        id: check
        run: |
          today=$(date -u +%Y%m%d)
          if [ "$today" -ge "20260611" ] && [ "$today" -le "20260719" ]; then
            echo "active=true"  >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Outside tournament window ($today) — skipping."
          fi

  update:
    needs: check-window
    if: needs.check-window.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/update-results.js

      - name: Fetch Elo ratings
        continue-on-error: true
        run: |
          if node -e "
            const h=require('./elo-history.json');
            const last=h._lastFetched;
            const ageMin=last?(Date.now()-new Date(last))/60000:Infinity;
            process.exit(ageMin < 60 ? 0 : 1);
          " 2>/dev/null; then
            echo "Elo fetched within last hour — skipping"
          else
            node scripts/update-elo.js
          fi

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet results.js elo-history.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "wc26-results-bot"
          git config user.email "noreply@github.com"
          git add results.js last-update.json elo-history.json
          git commit -m "chore: auto-update results.js [skip ci]"
          git push
