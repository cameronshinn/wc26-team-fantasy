  <polygon points="62.10,33.35 58.97,23.72 67.16,17.77 75.35,23.72 72.22,33.35" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon points="69.57,56.36 77.76,50.41 85.95,56.36 82.82,65.99 72.70,65.99" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon points="50.00,70.58 58.19,76.53 55.06,86.16 44.94,86.16 41.81,76.53" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon points="30.43,56.36 27.30,65.99 17.18,65.99 14.05,56.36 22.24,50.41" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon points="37.90,33.35 27.78,33.35 24.65,23.72 32.84,17.77 41.03,23.72" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
