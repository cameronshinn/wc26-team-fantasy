  <polygon clip-path="url(#ballClip)" points="28.23,42.93 22.24,50.41 14.05,56.36 8.74,42.65 27.78,33.35 37.90,33.35" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
  <polygon clip-path="url(#ballClip)" points="50.00,27.11 41.03,23.72 32.84,17.77 44.25,8.49 58.97,23.72 62.10,33.35" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>

