  <polygon clip-path="url(#ballClip)" points="63.45,68.52 72.70,65.99 82.82,65.99 79.20,80.20 58.19,76.53 50.00,70.58" fill="none" stroke="#12161b" stroke-width="1.8" stroke-linejoin="round"/>
